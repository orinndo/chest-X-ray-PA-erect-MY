<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>胸部立位正面（ရင်ဘတ်ဓာတ်မှန်）မြန်မာဘာသာ အသံလမ်းညွှန်</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
background:linear-gradient(180deg,#f7fbff,#eef6ff);color:#0f172a;}
.header{padding:18px 16px 10px;}
.frame-title{border:2px solid #38bdf8;padding:14px 16px;border-radius:14px;background:#f8fcff;text-align:center;}
.frame-title h1{margin:0;font-size:20px;}
.frame-title p{margin:6px 0 0;font-size:14px;color:#475569;}
.note{font-size:12px;color:#475569;margin:12px 16px;}
.main{margin:0 16px 24px;padding:16px;background:#fff;border-radius:18px;box-shadow:0 8px 18px rgba(15,23,42,.08);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{flex:1;max-width:100%;font-size:16px;padding:10px 36px 10px 12px;border-radius:12px;border:1px solid #cbd5f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
button{font-size:15px;padding:10px 14px;border-radius:12px;border:1px solid #cbd5f5;background:#eff6ff;}
button:active{transform:scale(.98);}
.label{margin-top:14px;font-size:13px;color:#475569;}
.jp{font-size:18px;font-weight:600;margin-top:6px;}
.en{font-size:16px;margin-top:4px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
audio{width:100%;margin-top:10px;}
.status{margin-top:8px;font-size:13px;color:#475569;}
.hint{margin-top:10px;font-size:12px;color:#64748b;}
</style>
</head>
<body>
<div class="header">
  <div class="frame-title">
    <h1>胸部立位正面（ရင်ဘတ်ဓာတ်မှန်）</h1>
    <p>မြန်မာဘာသာ အသံလမ်းညွှန်</p>
  </div>
</div>

<p class="note">※ iPhone ・ iPad ・ Android で再生できます。最初は「再生」を押してください。</p>

<div class="main">
  <div class="row">
    <select id="sel"></select>
    <button id="prev">← 前</button>
    <button id="next">次 →</button>
  </div>

  <div class="label">日本語</div>
  <div class="jp" id="jp"></div>

  <div class="label">ミャンマー語</div>
  <div class="en" id="en"></div>

  <div class="controls">
    <button id="play">▶︎ 再生</button>
    <button id="pause">⏸ 一時停止</button>
    <button id="replay">↻ もう一度</button>
  </div>

  <div class="status" id="status">待機中　အသင့်ဖြစ်ပါသည်</div>
  <audio id="player" controls></audio>

  <div class="hint">
    再生できない場合：消音モード解除、音量、Bluetooth接続を確認してください。
  </div>
</div>

<script>
const STEPS = [
 {preview:"すみません、少しよろしいですか？", jp:"すみません、少しよろしいですか？", en:"ဆောရီးပါ။ ခဏလောက် အချိန်ပေးလို့ ရမလား။"},
 {preview:"こちらをご覧ください。これはあな…", jp:"こちらをご覧ください。これはあなたのお名前と生年月日で合っていますか？", en:"ဒီကို ကြည့်ပေးပါ။ ဒီမှာ ရေးထားတဲ့ အမည်နဲ့ မွေးသက္ကရာဇ်က မှန်ပါသလား။"},
 {preview:"お名前と生年月日を教えていただけ…", jp:"お名前と生年月日を教えていただけますか？", en:"အမည်နဲ့ မွေးသက္ကရာဇ်ကို ပြောပြပေးလို့ ရမလား။"},
 {preview:"簡単な日本語は理解できますか？", jp:"簡単な日本語は理解できますか？", en:"လွယ်ကူတဲ့ ဂျပန်စကားကို နားလည်နိုင်ပါသလား။"},
 {preview:"ミャンマー語の音声ガイドを使用…", jp:"（通訳不在時）ミャンマー語の音声ガイドで検査を説明します。音声の指示に従ってください。", en:"စကားပြန် မရှိသောအခါ မြန်မာဘာသာ အသံလမ်းညွှန်ဖြင့် စစ်ဆေးမှုကို ရှင်းပြပါမည်။ အသံညွှန်ကြားချက်များကို လိုက်နာပေးပါ။"},
 {preview:"ミャンマー語通訳を呼びますので…", jp:"ミャンマー語を話せる通訳を呼びますので、しばらくお待ちください。", en:"မြန်မာဘာသာ ပြောနိုင်သော စကားပြန်ကို ခေါ်ပေးပါမည်။ ခဏ စောင့်ပေးပါ။"},
 {preview:"どうぞお入りください。", jp:"どうぞお入りください。", en:"ဝင်လာပါ။"},
 {preview:"これから胸部レントゲンを撮影しま…", jp:"これから胸部レントゲンを撮影します。", en:"ယခု ရင်ဘတ်ဓာတ်မှန် ရိုက်ပါမည်။"},
 {preview:"金属やプラスチック、湿布などを外…", jp:"身につけている金属やプラスチック製品、湿布などを外してください。", en:"ခန္ဓာကိုယ်ပေါ်တွင် ဝတ်ဆင်ထားသော သတ္တုပစ္စည်းများ၊ ပလတ်စတစ်ပစ္စည်းများ၊ ဆေးပလာစတာများကို ဖြုတ်ပေးပါ။"},
 {preview:"更衣室は17番受付の隣にあります…", jp:"（着替えが必要な場合）更衣室は17番受付の隣にあります。検査着は更衣室にありますので、更衣室で着替えてください。着替え終わったらここに戻ってきてください。", en:"အဝတ်လဲခန်းသည် ၁၇ နံပါတ် ကောင်တာဘေးတွင် ရှိပါသည်။ စစ်ဆေးရေးဝတ်စုံကို အဝတ်လဲခန်းထဲတွင် ထားထားပါသည်။ အဲဒီမှာ အဝတ်လဲပြီးပါက ဒီနေရာကို ပြန်လာပေးပါ။"},
 {preview:"ここに立って、胸をこのパネルにつ…", jp:"ここに立って、胸をこのパネルにつけてください。", en:"ဒီနေရာမှာ ရပ်ပြီး ရင်ဘတ်ကို ဒီပန်နယ်နှင့် ကပ်ပေးပါ။"},
 {preview:"あごをここにのせてください。", jp:"あごをここにのせてください。", en:"မေးစေ့ကို ဒီနေရာမှာ တင်ပေးပါ။"},
 {preview:"あごは乗せなくて大丈夫です…", jp:"あごはここに乗せなくて大丈夫です。上を向くだけで大丈夫です。", en:"မေးစေ့ကို ဒီနေရာမှာ မတင်လည်း ရပါသည်။ အပေါ်ကိုသာ မော့ကြည့်ပေးပါ။"},
 {preview:"両手で機械を抱えるようにしてくだ…", jp:"両手で機械を抱えるようにしてください。", en:"လက်နှစ်ဖက်ဖြင့် စက်ကို ပွေ့ထားသလို လုပ်ပေးပါ。"},
 {preview:"両手でこの取手を握ってください…", jp:"両手でこの取手を握ってください。", en:"ဒီလက်ကိုင်ကို လက်နှစ်ဖက်နဲ့ ကိုင်ပေးပါ。"},
 {preview:"動かないでください。", jp:"動かないでください。", en:"မလှုပ်ရှားပါနှင့်။"},
 {preview:"大きく息を吸って、止めてください…", jp:"大きく息を吸って、止めてください。", en:"အသက်ကို နက်နက်ရှိုင်းရှိုင်း ရှူပြီး ခဏ ထိန်းထားပါ။"},
 {preview:"楽にしてください。", jp:"楽にしてください。", en:"အေးအေးဆေးဆေး နေပေးပါ။"},
 {preview:"検査は終わりました。", jp:"検査は終わりました。", en:"စစ်ဆေးမှု ပြီးဆုံးပါပြီ။"},
 {preview:"次は診察がありますので、10番へ…", jp:"次は診察がありますので、10番へ行ってこのファイルを提出してください。", en:"နောက်တစ်ဆင့်မှာ ဆရာဝန် စစ်ဆေးမှု ရှိပါသည်။ ၁၀ နံပါတ်သို့ သွားပြီး ဒီဖိုင်ကို ဝန်ထမ်းထံ ပေးပို့ပါ။"},
 {preview:"19番または20番の前でお待ちくださ…", jp:"19番または20番の検査室の前でお待ちください。", en:"၁၉ နံပါတ် သို့မဟုတ် ၂၀ နံပါတ် စစ်ဆေးခန်းရှေ့တွင် စောင့်ပေးပါ။"},
 {preview:"23番の前でお待ちください。", jp:"23番の検査室の前でお待ちください。", en:"၂၃ နံပါတ် စစ်ဆေးခန်းရှေ့တွင် စောင့်ပေးပါ။"},
 {preview:"16番の前でお待ちください。", jp:"16番の検査室の前でお待ちください。", en:"၁၆ နံပါတ် စစ်ဆေးခန်းရှေ့တွင် စောင့်ပေးပါ။"},
 {preview:"もう着替えてもいいですよ。", jp:"（着替えていい場合）もう着替えてもいいですよ。", en:"ယခု အဝတ်ပြန်လဲလို့ ရပါပြီ။"},
 {preview:"まだ他の検査が残っています。", jp:"（他検査がある場合）まだ他の検査が残っています。", en:"အခြား စစ်ဆေးမှုများ ကျန်ရှိနေသေးပါသည်။"},
 {preview:"まだ着替えないでください。", jp:"（他検査がある場合）まだ着替えないでください。", en:"အခုတော့ အဝတ်မလဲသေးပါနှင့်။"},
];

const sel=document.getElementById('sel'),
jp=document.getElementById('jp'),
en=document.getElementById('en'),
player=document.getElementById('player'),
status=document.getElementById('status');

STEPS.forEach((s,i)=>{
 const o=document.createElement('option');
 o.value=i;
 o.textContent=`${String(i+1).padStart(2,'0')}｜${s.jp}`;
 sel.appendChild(o);
});

let idx=0;
function load(i){
 idx=Math.max(0,Math.min(STEPS.length-1,i));
 sel.value=idx;
 jp.textContent=STEPS[idx].jp;
 en.textContent=STEPS[idx].en;
 player.src=`audio/step_${String(idx+1).padStart(2,'0')}.m4a`;
 status.textContent="待機中　အသင့်ဖြစ်ပါသည်";
}
sel.onchange=()=>load(parseInt(sel.value));
document.getElementById('prev').onclick=()=>load(idx-1);
document.getElementById('next').onclick=()=>load(idx+1);
document.getElementById('play').onclick=()=>player.play();
document.getElementById('pause').onclick=()=>player.pause();
document.getElementById('replay').onclick=()=>{player.currentTime=0;player.play();}
player.onplay=()=>status.textContent="再生中　ဖွင့်နေပါသည်";
player.onpause=()=>status.textContent="一時停止　一時ရပ်ထားပါသည်";
player.onended=()=>status.textContent="待機中　အသင့်ဖြစ်ပါသည်";
load(0);
</script>
</body>
</html>
